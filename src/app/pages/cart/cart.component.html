<div class="cart-container">

  <h1>Your Cart</h1>

  <div class="cart-item" *ngFor="let item of cartItems">
    <img [src]="item.image">

    <div class="info">
      <h3>{{ item.name }}</h3>
      <p>PKR {{ item.price }}</p>

      <div class="qty">
        <button (click)="updateQty(item, item.quantity - 1)">−</button>
        <span>{{ item.quantity }}</span>
        <button (click)="updateQty(item, item.quantity + 1)">+</button>
      </div>
    </div>

    <button class="remove" (click)="remove(item.id)">✕</button>
  </div>

  <div class="total">
    Total: <strong>PKR {{ total }}</strong>
  </div>

  <button routerLink="/checkout" class="checkout-btn">
    Proceed to Checkout
  </button>

</div>
