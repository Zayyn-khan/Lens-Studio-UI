 <!-- Banner -->
  <section class="banner">
    <div class="banner-content">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you! Reach out today.</p>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact-section">

    <!-- Contact Form -->
    <div class="contact-form">
      <h2>Get in Touch</h2>
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Subject" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- Map -->
    <div class="contact-map">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.0863341369266!2d-122.41941518468109!3d37.77492927975965!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c2fa7e6f1%3A0xe3b2d0a88b6a2b42!2sSan+Francisco%2C+CA!5e0!3m2!1sen!2sus!4v1600000000000!5m2!1sen!2sus"
        allowfullscreen="" loading="lazy"></iframe>
    </div>
